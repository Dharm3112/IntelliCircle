services:
  - type: web
    name: intellicircle-server
    env: node
    plan: free
    buildCommand: "npm install"
    startCommand: "npm run start"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: intellicircle-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: NODE_OPTIONS
        value: "--max-old-space-size=512" # Web tier needs more headroom
      - key: DATADOG_API_KEY
        sync: false # Set securely in Render Dashboard
      - key: NEXT_PUBLIC_POSTHOG_KEY
        sync: false # Set securely in Render Dashboard

databases:
  - name: intellicircle-db
    plan: free
    