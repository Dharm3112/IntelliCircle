# IntelliCircle Client — Netlify Deployment Configuration
# base tells Netlify where the Next.js app lives in this monorepo.
# The @netlify/plugin-nextjs then finds .next relative to base.

[build]
  base = "packages/client"
  command = "npm run build"
  publish = ".next"

# Note: Netlify detects npm workspaces and installs deps from the
# monorepo root automatically, so shared packages resolve correctly.